<!doctype html>
<html lang="zh-TW" class="p-light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>食物地圖 — 午餐轉盤</title>
  <link rel="stylesheet" href="lib/primeng/colors_and_type.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#ffffff">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <!-- Wheel concept: 6 emerald-tone sectors with a pointer -->
      <g transform="translate(200 210)">
        <circle r="148" fill="#ffffff" stroke="#e4e4e7" stroke-width="2" />
        <path d="M 0 0 L 0 -148 A 148 148 0 0 1 128.2 -74 Z" fill="#10b981" />
        <path d="M 0 0 L 128.2 -74 A 148 148 0 0 1 128.2 74 Z" fill="#34d399" />
        <path d="M 0 0 L 128.2 74 A 148 148 0 0 1 0 148 Z" fill="#f59e0b" />
        <path d="M 0 0 L 0 148 A 148 148 0 0 1 -128.2 74 Z" fill="#0ea5e9" />
        <path d="M 0 0 L -128.2 74 A 148 148 0 0 1 -128.2 -74 Z" fill="#a855f7" />
        <path d="M 0 0 L -128.2 -74 A 148 148 0 0 1 0 -148 Z" fill="#ef4444" />
        <circle r="34" fill="#ffffff" stroke="#e4e4e7" stroke-width="2" />
      </g>
      <!-- Pointer -->
      <path d="M 200 90 L 184 50 Q 200 42 216 50 Z" fill="#059669" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" />
    </svg>
  </template>

  <div id="root"></div>

  <script src="data.js"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="login.jsx"></script>
  <script type="text/babel" src="wheel.jsx"></script>
  <script type="text/babel" src="slot.jsx"></script>
  <script type="text/babel" src="views.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const state = window.useFmStore();
      const [page, setPage] = useState('today');

      // sync from Google Sheet on first load (or when user logs in)
      useEffect(() => {
        if (!state.user) return;
        const lastSync = state.sheet?.lastSync ? new Date(state.sheet.lastSync) : null;
        const stale = !lastSync || (Date.now() - lastSync.getTime()) > 5 * 60 * 1000; // 5min
        if (stale) window.fmStore.syncFromSheet();
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [state.user?.email]);

      if (!state.user) {
        return <div data-screen-label="01 Login"><FmLogin /></div>;
      }

      const labels = { today: '02 Today', history: '03 History', admin: '04 Admin' };
      return (
        <div data-screen-label={labels[page]}>
          <AppShell page={page} onPage={setPage}>
            {page === 'today' && <TodayView />}
            {page === 'history' && <HistoryView />}
            {page === 'admin' && <AdminView />}
          </AppShell>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
